<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmez votre email</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .card {
      background-color: #1e293b;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      border: 1px solid #334155;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 24px;
      display: inline-block;
    }
    .logo span {
      background: linear-gradient(to right, #60a5fa, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 {
      color: #fff;
      font-size: 24px;
      margin-bottom: 16px;
    }
    p {
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .button {
      display: inline-block;
      background-color: #3b82f6;
      color: #fff;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #2563eb;
    }
    .footer {
      margin-top: 32px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">Gaming<span>PC</span></div>
      <h1>Confirmez votre adresse email</h1>
      <p>Merci de vous être inscrit ! Pour activer votre compte et accéder à toutes les fonctionnalités, veuillez cliquer sur le bouton ci-dessous.</p>
      <a href="{{ .ConfirmationURL }}" class="button">Confirmer mon email</a>
    </div>
    <div class="footer">
      <p>Si vous n'avez pas créé de compte, vous pouvez ignorer cet email.</p>
    </div>
  </div>
</body>
</html>
